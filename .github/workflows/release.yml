name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version (between two ## [...] headings)
          awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md \
            | sed '$d' \
            > release-notes.md
          # Fallback: if extraction is empty, use the whole CHANGELOG
          if [ ! -s release-notes.md ]; then
            cp CHANGELOG.md release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
          body_path: release-notes.md
